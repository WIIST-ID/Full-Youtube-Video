<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Watch our latest video on YouTube">
  <title>Tonton Video Kami</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 60px 40px;
      max-width: 500px;
      text-align: center;
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      font-size: 60px;
      margin-bottom: 20px;
      display: inline-block;
    }

    h1 {
      color: #1a1a1a;
      font-size: 32px;
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #666;
      font-size: 16px;
      margin-bottom: 40px;
      line-height: 1.6;
      font-weight: 400;
    }

    .cta-button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      padding: 16px 48px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: none;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      position: relative;
      overflow: hidden;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transition: left 0.3s ease;
    }

    .cta-button:hover::before {
      left: 100%;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
    }

    .cta-button:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
    }

    .trust-signals {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #eee;
      color: #999;
      font-size: 13px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .checkmark {
      color: #667eea;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 24px;
      }

      h1 {
        font-size: 28px;
      }

      .cta-button {
        padding: 14px 40px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">▶️</div>
    <h1>Tonton Video Terbaru Kami</h1>
    <p class="subtitle">Konten berkualitas yang dirancang khusus untuk Anda. Klik di bawah untuk mulai menonton sekarang.</p>
    
    <a class="cta-button" id="youtubeLink" href="https://www.youtube.com/watch?v=5qD4uq2NF-c">
      Tonton di YouTube
    </a>

    <div class="trust-signals">
      <div class="trust-item">
        <span class="checkmark">✓</span>
        <span>HD Quality</span>
      </div>
      <div class="trust-item">
        <span class="checkmark">✓</span>
        <span>100% Aman</span>
      </div>
    </div>
  </div>

  <script>
    function detectDeviceAndSetLink() {
      const userAgent = navigator.userAgent.toLowerCase();
      const isApple = /iphone|ipad|ipod|mac/.test(userAgent);
      const isAndroid = /android/.test(userAgent);
      
      const link = document.getElementById('youtubeLink');
      
      if (isAndroid) {
        link.href = 'intent://www.youtube.com/watch?v=5qD4uq2NF-c#Intent;package=com.google.android.youtube;scheme=https;end';
      } else if (isApple) {
        link.href = 'https://www.youtube.com/watch?v=5qD4uq2NF-c';
      } else {
        link.href = 'https://www.youtube.com/watch?v=5qD4uq2NF-c';
      }
    }
    
    detectDeviceAndSetLink();
  </script>
</body>
</html>
