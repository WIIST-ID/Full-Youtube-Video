<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tonton Full Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #222222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #FF0000;
      object-fit: cover;
      box-shadow: 0 4px 12px rgba(255, 0, 0, 0.2);
    }
    .profile h1 {
      color: white;
      font-size: 28px;
      font-weight: bold;
    }
    a {
      background: #FF0000;
      color: white;
      text-decoration: none;
      padding: 14px 40px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      border: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
      transform: scale(1);
      animation: modernBlink 1.5s ease-in-out infinite;
    }
    a:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 0, 0, 0.4);
      background: #e60000;
      animation: none;
    }
    a:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(255, 0, 0, 0.3);
    }
    @keyframes modernBlink {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.02);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
    a:focus {
      outline: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <img src="1ind.png" alt="WIIST ID Profile Picture">
      <h1>WIIST ID</h1>
    </div>
    <a id="youtubeLink" href="https://youtu.be/5qD4uq2NF-c?si=96VzdlxdUBAQgvAV">
      👉▶ Tonton Versi Full👈
    </a>
  </div>

  <script>
    function detectDeviceAndSetLink() {
      const userAgent = navigator.userAgent.toLowerCase();
      const isApple = /iphone|ipad|ipod|mac/.test(userAgent);
      const isAndroid = /android/.test(userAgent);
      
      const link = document.getElementById('youtubeLink');
      const videoId = '5qD4uq2NF-c';
      const youtubeWebUrl = 'https://www.youtube.com/watch?v=' + videoId;
      
      if (isAndroid) {
        // Android: Try YouTube app first, fallback to web browser
        link.href = 'intent://www.youtube.com/watch?v=' + videoId + '#Intent;package=com.google.android.youtube;scheme=https;end';
        link.onclick = function(e) {
          e.preventDefault();
          // Try the intent, if it fails redirect to web URL
          window.location.href = link.href;
          setTimeout(function() {
            window.location.href = youtubeWebUrl;
          }, 500);
          return false;
        };
      } else if (isApple) {
        // Apple: Use YouTube app scheme or standard https link
        link.href = 'https://www.youtube.com/watch?v=' + videoId;
      } else {
        // Desktop or other: Use standard https link
        link.href = youtubeWebUrl;
      }
    }
    
    // Run on page load
    detectDeviceAndSetLink();
  </script>
</body>
</html>
