<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="1ind.png">
  <title>Tonton Full Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
     body {
      background: #222222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 30px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 480px;
    }
    .profile {
      width: 100%;
    }
    .profile a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      transition: transform 0.2s ease;
    }
    .profile a:hover {
      transform: scale(1.02);
    }
    .profile img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid #FF0000;
      object-fit: cover;
      box-shadow: 0 4px 12px rgba(255, 0, 0, 0.3);
    }
    .profile h1 {
      color: white;
      font-size: 24px;
      font-weight: bold;
    }
 
    .videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }
 
    .video-card {
      background: #2e2e2e;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
    }
    .video-card:hover {
      transform: translateY(-2px);
    }
    
    .video-card:first-child {
      grid-column: 1 / -1;
      width: 75%;
      justify-self: center;
    }
    
    .video-card:not(:first-child) .card-footer {
      padding: 12px;
    }
    
    .video-card:not(:first-child) .card-title {
      font-size: 13px;
      margin-bottom: 6px;
      min-height: 18px;
    }
    
    .video-card:not(:first-child) .play-icon {
      width: 44px;
      height: 44px;
    }
    
    .video-card:not(:first-child) .play-icon svg {
      width: 16px;
      height: 16px;
      margin-left: 2px;
    }
    
    .video-card:not(:first-child) .badge {
      font-size: 10px;
      padding: 3px 6px;
      bottom: 8px;
      left: 8px;
    }
 
    .thumbnail-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
    }
    .thumbnail-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: background 0.2s;
    }
    .video-card:hover .play-overlay {
      background: rgba(0,0,0,0.15);
    }
    .play-icon {
      width: 52px;
      height: 52px;
      background: #FF0000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(255,0,0,0.5);
    }
    .play-icon svg {
      margin-left: 4px;
    }
 
    .badge {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: #FF0000;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
 
    .card-footer {
      padding: 12px 14px 14px;
    }
    .card-label {
      color: #aaa;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .card-title {
      color: white;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 20px;
    }
    .card-title.loading {
      background: #3a3a3a;
      border-radius: 6px;
      color: transparent;
      animation: shimmer 1.2s infinite;
      width: 80%;
      height: 18px;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    .card-cta {
      color: #FF0000;
      font-size: 13px;
      font-weight: 700;
    }
 
    /* make the whole card clickable */
    .video-card a {
      text-decoration: none;
      color: inherit;
      display: block;
      background: none;
      padding: 0;
      border-radius: 0;
      font-size: inherit;
      font-weight: inherit;
      box-shadow: none;
      animation: none;
      gap: 0;
    }
    .video-card a:hover {
      transform: none;
      box-shadow: none;
      background: none;
    }

    /* Animation for the begging-to-be-clicked effect */
    @keyframes beg-to-click {
      0%, 100% { transform: rotate(0deg) scale(1); }
      10% { transform: rotate(-2deg) scale(1.02); }
      20% { transform: rotate(2deg) scale(1.02); }
      30% { transform: rotate(-2deg) scale(1.02); }
      40% { transform: rotate(2deg) scale(1.02); }
      50% { transform: rotate(0deg) scale(1); }
    }

    /* Class to apply the animation */
    .shake-card {
      animation: beg-to-click 1.5s infinite ease-in-out;
      transform-origin: center;
    }
    
    /* Ensure the hover state doesn't break the animation violently */
    .shake-card:hover {
      animation-play-state: paused;
      transform: translateY(-2px) scale(1.02);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile">
      <a id="profile-link" href="https://www.youtube.com/@WIIST-id">
        <img src="1ind.png" alt="WIIST ID Profile Picture">
        <h1>WIIST ID</h1>
      </a>
    </div>

    <div class="videos" id="video-container">
      <!-- Video cards will be injected here automatically by the scripts below -->
    </div>
  </div>

  <script>
    // ==============================================================================
    // CONFIGURATION: Edit your videos here! (Just change the ID and labels)
    // ==============================================================================
    const VIDEOS = [
      {
        id: '1evpONN2ib4', // Terbaru video
        badge: '✨ Terbaru',
        badgeStyle: 'background:#333; border: 1px solid #555;',
        label: 'Video terbaru',
        shake: true       // Set to true to make the card wiggle
      },
      {
        id: 'HPaSY2tO0U4', // First viral video
        badge: '🔥 Viral',
        badgeStyle: '',
        label: '',
        shake: false
      },
      {
        id: 'JQ4lCrtw9Jo', // Existing viral video
        badge: '🔥 Viral',
        badgeStyle: '',
        label: '',
        shake: false
      }
    ];

    // ==============================================================================
    // LOGIC: Automatically renders the videos to screen (No need to edit below)
    // ==============================================================================
    function renderVideos() {
      const container = document.getElementById('video-container');
      
      container.innerHTML = VIDEOS.map((video, index) => {
        const shakeClass = video.shake ? 'shake-card' : '';
        const labelHtml = video.label ? `<div class="card-label">${video.label}</div>` : '';
        const badgeStyleAttr = video.badgeStyle ? `style="${video.badgeStyle}"` : '';
        
        return `
          <div class="video-card ${shakeClass}">
            <a id="link-${index}" href="https://youtu.be/${video.id}">
              <div class="thumbnail-wrap">
                <img src="https://img.youtube.com/vi/${video.id}/maxresdefault.jpg" alt="Video thumbnail"
                  onerror="this.src='https://img.youtube.com/vi/${video.id}/hqdefault.jpg'">
                <div class="play-overlay">
                  <div class="play-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                      <polygon points="5,3 19,12 5,21"/>
                    </svg>
                  </div>
                </div>
                <span class="badge" ${badgeStyleAttr}>${video.badge}</span>
              </div>
              <div class="card-footer">
                ${labelHtml}
                <div class="card-title loading" id="title-${index}"></div>
              </div>
            </a>
          </div>
        `;
      }).join('');

      // Attach the link routing and title fetching logic
      VIDEOS.forEach((video, index) => {
        setupLink(document.getElementById(`link-${index}`), video.id);
        fetchTitle(video.id, `title-${index}`);
      });
    }

    function getYouTubeLink(videoId, deviceType) {
      const webUrl = 'https://www.youtube.com/watch?v=' + videoId;
      if (deviceType === 'android') {
        return 'intent://www.youtube.com/watch?v=' + videoId + '#Intent;package=com.google.android.youtube;scheme=https;end';
      }
      return webUrl;
    }

    function setupLink(linkEl, videoId) {
      if (!linkEl) return;
      const ua = navigator.userAgent.toLowerCase();
      const isAndroid = /android/.test(ua);
      const webUrl = 'https://www.youtube.com/watch?v=' + videoId;

      if (isAndroid) {
        linkEl.href = getYouTubeLink(videoId, 'android');
        linkEl.onclick = function(e) {
          e.preventDefault();
          window.location.href = linkEl.href;
          setTimeout(function() { window.location.href = webUrl; }, 500);
          return false;
        };
      } else {
        linkEl.href = webUrl;
      }
    }

    async function fetchTitle(videoId, titleElId) {
      const el = document.getElementById(titleElId);
      if (!el) return;
      try {
        const res = await fetch('https://noembed.com/embed?url=https://www.youtube.com/watch?v=' + videoId);
        const data = await res.json();
        if (data.title) {
          el.textContent = data.title;
          el.classList.remove('loading');
        }
      } catch (e) {
        el.textContent = 'Video Title';
        el.classList.remove('loading');
      }
    }

    // Initialize the page on load
    renderVideos();

    // Setup profile link routing logic (works for Android, iOS, and Web)
    const profileLink = document.getElementById('profile-link');
    if (profileLink) {
      const channelUrl = 'https://www.youtube.com/@WIIST-id';
      const ua = navigator.userAgent.toLowerCase();
      const isAndroid = /android/.test(ua);
      
      if (isAndroid) {
        const intentUrl = 'intent://www.youtube.com/@WIIST-id#Intent;package=com.google.android.youtube;scheme=https;end';
        profileLink.href = intentUrl;
        profileLink.onclick = function(e) {
          e.preventDefault();
          window.location.href = profileLink.href;
          setTimeout(function() { window.location.href = channelUrl; }, 500);
          return false;
        };
      } else {
        profileLink.href = channelUrl;
      }
    }
  </script>
</body>
</html>
