<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tonton di YouTube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }
    a {
      background: #FF0000;
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    a:active { opacity: 0.8; }
  </style>
</head>
<body>
  <a id="youtubeLink" href="https://www.youtube.com/watch?v=5qD4uq2NF-c">
    ▶ Tonton di YouTube
  </a>

  <script>
    function detectDeviceAndSetLink() {
      const userAgent = navigator.userAgent.toLowerCase();
      const isApple = /iphone|ipad|ipod|mac/.test(userAgent);
      const isAndroid = /android/.test(userAgent);
      
      const link = document.getElementById('youtubeLink');
      
      if (isAndroid) {
        // Android: Use intent scheme for YouTube app with fallback to web browser
        link.href = 'intent://www.youtube.com/watch?v=5qD4uq2NF-c#Intent;package=com.google.android.youtube;scheme=https;S.browser_fallback_url=https://www.youtube.com/watch?v=5qD4uq2NF-c;end';
      } else if (isApple) {
        // Apple: Use YouTube scheme or standard https link
        link.href = 'https://www.youtube.com/watch?v=5qD4uq2NF-c';
      } else {
        // Desktop or other: Use standard https link
        link.href = 'https://www.youtube.com/watch?v=5qD4uq2NF-c';
      }
    }
    
    // Run on page load
    detectDeviceAndSetLink();
  </script>
</body>
</html>
