<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tonton di YouTube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }
    a {
      background: #FF0000;
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    a:active { opacity: 0.8; }
  </style>
</head>
<body>
  <a id="youtubeLink" href="https://www.youtube.com/watch?v=5qD4uq2NF-c">
    ▶ Tonton di YouTube
  </a>

  <script>
    function detectDeviceAndSetLink() {
      const userAgent = navigator.userAgent.toLowerCase();
      const isApple = /iphone|ipad|ipod|mac/.test(userAgent);
      const isAndroid = /android/.test(userAgent);
      
      const link = document.getElementById('youtubeLink');
      const videoId = '5qD4uq2NF-c';
      const youtubeWebUrl = 'https://www.youtube.com/watch?v=' + videoId;
      
      if (isAndroid) {
        // Android: Try YouTube app first, fallback to web browser
        link.href = 'intent://www.youtube.com/watch?v=' + videoId + '#Intent;package=com.google.android.youtube;scheme=https;end';
        link.onclick = function(e) {
          e.preventDefault();
          // Try the intent, if it fails redirect to web URL
          window.location.href = link.href;
          setTimeout(function() {
            window.location.href = youtubeWebUrl;
          }, 500);
          return false;
        };
      } else if (isApple) {
        // Apple: Use YouTube app scheme or standard https link
        link.href = 'https://www.youtube.com/watch?v=' + videoId;
      } else {
        // Desktop or other: Use standard https link
        link.href = youtubeWebUrl;
      }
    }
    
    // Run on page load
    detectDeviceAndSetLink();
  </script>
</body>
</html>
